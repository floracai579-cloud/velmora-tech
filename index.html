<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velmora | Smart Living Starts Here</title>
  <meta name="description" content="Velmora designs premium small kitchen appliances for global buyers and OEM/ODM partners." />
  <link rel="icon" href="logo.png" />
  <style>
    :root{--bg:#f5f5f7;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--brand:#ff6900;--card:#fff;--dark:#12141a}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .top{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
    .nav{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:12px 20px}
    .brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text)} .brand img{width:34px;height:34px;border-radius:8px}.brand strong{font-size:20px}
    .menu{display:flex;gap:18px;align-items:center}.menu a{text-decoration:none;color:#374151;font-size:14px}
    .lang{padding:7px 10px;border:1px solid var(--line);border-radius:999px;background:#fff}
    .hero{background:linear-gradient(120deg,#161821,#282e3b);color:#fff;padding:64px 20px}
    .hero-wrap{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1.1fr .9fr;gap:28px;align-items:center}
    .hero h1{font-size:clamp(34px,5vw,56px);margin:0 0 10px}.hero p{color:#d1d5db;line-height:1.6;margin:0 0 20px;max-width:620px}
    .btn{display:inline-block;padding:12px 22px;border-radius:999px;background:var(--brand);color:#fff;text-decoration:none;font-weight:600}
    .hero img{width:100%;border-radius:18px;display:block}
    .section{max-width:1200px;margin:0 auto;padding:56px 20px}
    h2{font-size:32px;margin:0 0 22px;text-align:center}
    .products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 8px 20px rgba(17,24,39,.05)}
    .card img{width:100%;height:220px;object-fit:cover}.card .c{padding:14px}.card h3{margin:0 0 8px}.card p{margin:0 0 14px;color:var(--muted);font-size:14px}
    .contact{background:#fff;border:1px solid var(--line);border-radius:16px;padding:28px;text-align:center}
    .contact a{color:#111827}
    footer{text-align:center;color:#6b7280;padding:26px 0 40px}
    @media (max-width:860px){.hero-wrap{grid-template-columns:1fr}.menu a{display:none}.menu .lang{display:block}}
  </style>
</head>
<body>
  <header class="top">
    <nav class="nav">
      <a class="brand" href="#home"><img src="logo.png" alt="Velmora logo"><strong>Velmora</strong></a>
      <div class="menu">
        <a href="#products" data-i18n="navProducts"></a>
        <a href="#contact" data-i18n="navContact"></a>
        <select class="lang" id="lang" aria-label="Language switcher">
          <option value="en">English</option><option value="es">Español</option><option value="fr">Français</option>
          <option value="de">Deutsch</option><option value="it">Italiano</option><option value="zh">中文</option>
        </select>
      </div>
    </nav>
  </header>

  <section class="hero" id="home">
    <div class="hero-wrap">
      <div>
        <h1>Velmora</h1>
        <p data-i18n="heroSubtitle"></p>
        <a href="#contact" class="btn" data-i18n="heroCta"></a>
      </div>
      <img src="hero.jpg" alt="Premium kitchen appliances" />
    </div>
  </section>

  <section class="section" id="products">
    <h2 data-i18n="productsTitle"></h2>
    <div class="products" id="productGrid"></div>
  </section>

  <section class="section" id="contact">
    <div class="contact">
      <h2 data-i18n="contactTitle"></h2>
      <p data-i18n="contactDesc"></p>
      <p>Email: <a href="mailto:sales@velmora-tech.com">sales@velmora-tech.com</a></p>
      <p>WhatsApp: <a href="https://wa.me/8615810201140" target="_blank" rel="noopener">+86 15810201140</a></p>
    </div>
  </section>

  <footer>© <span id="year"></span> Velmora · <span data-i18n="slogan"></span></footer>

  <script>
    const content = {
      en:{navProducts:"Products",navContact:"Contact",heroSubtitle:"Smart Living Starts Here. Premium small kitchen appliances built for modern homes and global distribution.",heroCta:"Send Inquiry",productsTitle:"Featured Product Categories",contactTitle:"Contact Velmora",contactDesc:"Connect with our team for OEM/ODM and product inquiries.",slogan:"Smart Living Starts Here",products:[
        {name:"Milk Frother",point:"Rich foam in seconds for café-style drinks.",img:"juicer.jpg"},
        {name:"Air Fryer",point:"Crispy cooking with less oil and smart controls.",img:"dryer.jpg"},
        {name:"Personal Blender",point:"Compact high-speed blending for daily nutrition.",img:"blender.jpg"},
        {name:"Coffee Maker",point:"Consistent aroma extraction with easy cleanup.",img:"lunchbox.jpg"}
      ]},
      es:{navProducts:"Productos",navContact:"Contacto",heroSubtitle:"La vida inteligente empieza aquí. Pequeños electrodomésticos premium para hogares modernos y distribución global.",heroCta:"Enviar consulta",productsTitle:"Categorías destacadas",contactTitle:"Contactar a Velmora",contactDesc:"Conecta con nuestro equipo para OEM/ODM y consultas de productos.",slogan:"Smart Living Starts Here",products:[
        {name:"Milk Frother",point:"Espuma cremosa en segundos para bebidas tipo cafetería.",img:"juicer.jpg"},{name:"Air Fryer",point:"Cocción crujiente con menos aceite y control inteligente.",img:"dryer.jpg"},{name:"Personal Blender",point:"Mezclado compacto y potente para nutrición diaria.",img:"blender.jpg"},{name:"Coffee Maker",point:"Aroma consistente y limpieza sencilla.",img:"lunchbox.jpg"}]},
      fr:{navProducts:"Produits",navContact:"Contact",heroSubtitle:"La vie intelligente commence ici. Des appareils de cuisine premium pour les foyers modernes et la distribution mondiale.",heroCta:"Envoyer une demande",productsTitle:"Catégories en vedette",contactTitle:"Contacter Velmora",contactDesc:"Contactez notre équipe pour OEM/ODM et demandes produits.",slogan:"Smart Living Starts Here",products:[
        {name:"Milk Frother",point:"Mousse riche en quelques secondes pour boissons café.",img:"juicer.jpg"},{name:"Air Fryer",point:"Cuisson croustillante avec moins d'huile et contrôle intelligent.",img:"dryer.jpg"},{name:"Personal Blender",point:"Mixage compact haute vitesse pour la nutrition quotidienne.",img:"blender.jpg"},{name:"Coffee Maker",point:"Extraction d'arôme constante et nettoyage facile.",img:"lunchbox.jpg"}]},
      de:{navProducts:"Produkte",navContact:"Kontakt",heroSubtitle:"Smart Living Starts Here. Premium-Küchengeräte für moderne Haushalte und weltweiten Vertrieb.",heroCta:"Anfrage senden",productsTitle:"Produktkategorien",contactTitle:"Velmora kontaktieren",contactDesc:"Kontaktieren Sie unser Team für OEM/ODM und Produktanfragen.",slogan:"Smart Living Starts Here",products:[
        {name:"Milk Frother",point:"Cremiger Milchschaum in Sekunden für Café-Getränke.",img:"juicer.jpg"},{name:"Air Fryer",point:"Knuspriges Garen mit weniger Öl und smarter Steuerung.",img:"dryer.jpg"},{name:"Personal Blender",point:"Kompaktes High-Speed-Mixen für tägliche Ernährung.",img:"blender.jpg"},{name:"Coffee Maker",point:"Konstante Aromaextraktion und einfache Reinigung.",img:"lunchbox.jpg"}]},
      it:{navProducts:"Prodotti",navContact:"Contatto",heroSubtitle:"La vita smart inizia qui. Piccoli elettrodomestici premium per case moderne e distribuzione globale.",heroCta:"Invia richiesta",productsTitle:"Categorie in evidenza",contactTitle:"Contatta Velmora",contactDesc:"Contatta il nostro team per OEM/ODM e richieste prodotto.",slogan:"Smart Living Starts Here",products:[
        {name:"Milk Frother",point:"Schiuma ricca in pochi secondi per bevande da caffetteria.",img:"juicer.jpg"},{name:"Air Fryer",point:"Cottura croccante con meno olio e controllo smart.",img:"dryer.jpg"},{name:"Personal Blender",point:"Frullatura compatta ad alta velocità per la nutrizione quotidiana.",img:"blender.jpg"},{name:"Coffee Maker",point:"Estrazione dell'aroma costante e pulizia semplice.",img:"lunchbox.jpg"}]},
      zh:{navProducts:"产品",navContact:"联系",heroSubtitle:"智能生活，从这里开始。为现代家庭与全球渠道打造的高端厨房小家电。",heroCta:"发送询盘",productsTitle:"精选产品分类",contactTitle:"联系 Velmora",contactDesc:"欢迎联系团队，洽谈 OEM/ODM 与产品合作。",slogan:"Smart Living Starts Here",products:[
        {name:"Milk Frother",point:"数秒打出细腻奶泡，轻松制作咖啡馆风味。",img:"juicer.jpg"},{name:"Air Fryer",point:"少油酥脆烹饪，智能操控更便捷。",img:"dryer.jpg"},{name:"Personal Blender",point:"高速便携搅拌，满足每日营养需求。",img:"blender.jpg"},{name:"Coffee Maker",point:"稳定萃取香气，清洁维护更轻松。",img:"lunchbox.jpg"}]}
    };
    const applyLang = (lang) => {
      const t = content[lang] || content.en;
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : lang;
      document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t[el.dataset.i18n]);
      const grid = document.getElementById('productGrid');
      grid.innerHTML = t.products.map(p => `<article class="card"><img src="${p.img}" alt="${p.name}"><div class="c"><h3>${p.name}</h3><p>${p.point}</p><a class="btn" href="#contact">${t.heroCta}</a></div></article>`).join('');
    };
    const select = document.getElementById('lang');
    select.addEventListener('change', e => applyLang(e.target.value));
    applyLang('en');
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
