<!DOCTYPE html>

  <link rel="icon" href="images/logo.png" />
  <style>
    :root{--text:#111827;--muted:#6b7280;--line:#e5e7eb;--bg:#f5f5f7;--card:#fff;--black:#111;--brand:#ff6900}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)} a{text-decoration:none;color:inherit}
    .container{max-width:1220px;margin:0 auto;padding:0 20px}
    .top-market,.announce{display:block}.hidden{display:none !important}
    .top-market{background:#fff;border-bottom:1px solid var(--line)} .top-row{display:flex;gap:12px;align-items:center;justify-content:space-between;padding:10px 0}
    .market-left{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.market-title{font-size:14px;color:#374151}.market-select{padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff}
    .btn{padding:10px 18px;border-radius:999px;border:1px solid transparent;font-weight:600;display:inline-block}.btn-primary{background:var(--brand);color:#fff}.btn-light{background:#fff;border-color:var(--line)}
    .icon-btn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 10px;cursor:pointer}
    .announce{background:#000;color:#fff}.announce .top-row{padding:10px 0}.announce p{margin:0;font-size:14px;color:#e5e7eb}
    .nav-wrap{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50}
    .nav{display:grid;grid-template-columns:1fr 2fr 1.5fr;align-items:center;min-height:72px;gap:10px}
    .logo img{height:30px}.center-nav,.right-nav{display:flex;gap:16px;align-items:center;justify-content:center}.right-nav{justify-content:flex-end}
    .center-nav a,.right-nav a{font-size:14px;color:#1f2937}
    .search{font-size:18px;line-height:1}
    .collection{background:#fafafa;border-bottom:1px solid var(--line)} .collection-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;gap:14px}
    .collection-left strong{display:block}.collection-left span{font-size:13px;color:var(--muted)} .collection-links{display:flex;gap:16px;font-size:14px;color:#374151}
    .hero{background:linear-gradient(120deg,#171b24,#2a3140);color:#fff;padding:66px 0}.hero-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:24px;align-items:center}
    .hero h1{font-size:clamp(30px,4.8vw,56px);margin:0 0 12px}.hero p{margin:0 0 24px;color:#d1d5db;max-width:640px;line-height:1.55}.hero-actions{display:flex;gap:12px;flex-wrap:wrap}

    .section{padding:58px 0}.section h2{font-size:34px;margin:0 0 22px;text-align:center}
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 6px 18px rgba(17,24,39,.06)} .card img{width:100%;height:220px;object-fit:cover}

        <a href="#contact" data-i18n="navSupport"></a>

        <a href="#contact" data-i18n="utilSupport"></a>
        <a href="#contact" data-i18n="utilContact"></a>
        <a href="#" class="search" aria-label="Search">⌕</a>

  <section class="collection">

        <a href="#oem" data-i18n="oem"></a>
        <a href="#contact" data-i18n="contact"></a>

        </div>
      </div>

  </section>

  <section class="section" id="products">

  <section class="section" id="oem">

    function applyLang(lang){
      const t=i18n[lang]||i18n.en;
      document.documentElement.lang=lang==='zh'?'zh-CN':lang;
      document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t[el.dataset.i18n]||'');
      document.getElementById('productGrid').innerHTML=t.productsData.map(p=>`<article class="card"><img src="${p.img}" alt="${p.name}"><div class="card-body"><h3>${p.name}</h3><p>${p.point}</p><div class="card-actions"><a href="#products" class="btn btn-light">${t.learnMore}</a><a href="#contact" class="btn btn-primary">${t.sendInquiry}</a></div></div></article>`).join('');
    }

    const langSelect=document.getElementById('langSelect');
    document.getElementById('continueBtn').addEventListener('click',()=>applyLang(langSelect.value));

    document.getElementById('closeMarket').addEventListener('click',()=>document.getElementById('marketBar').classList.add('hidden'));
    document.getElementById('closeAnnounce').addEventListener('click',()=>document.getElementById('announceBar').classList.add('hidden'));
